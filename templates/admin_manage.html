<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>后台数据库管理统计</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page" id="admin-manage-page">
    <header class="page-header">
      <h1>后台数据库管理统计</h1>
      <p class="subtle">仅展示页面骨架，具体数据与联动逻辑后续由脚本实现。</p>
    </header>

    <!-- 区域1：顶部状态区 -->
    <section class="panel" aria-labelledby="adminStatusTitle">
      <h2 id="adminStatusTitle">状态统计</h2>
      <ul aria-label="后台状态统计项">
        <li>
          <strong id="admin-stat-scope" aria-live="polite">x</strong>
        </li>
        <li>
          <strong id="admin-stat-messages" aria-live="polite">x</strong>
        </li>
      </ul>
    </section>

    <!-- 区域2：功能操作区 -->
    <section class="panel" aria-labelledby="adminActionTitle">
      <h2 id="adminActionTitle">功能操作</h2>

      <div>
        <label for="admin-scope-select">选择操作目标</label>
        <select id="admin-scope-select" aria-label="选择操作目标">
          <option value="none" selected>无</option>
        </select>
      </div>

      <div>
        <input
          id="admin-incremental-checkbox"
          name="admin-incremental-checkbox"
          type="checkbox"
          checked
          aria-label="是否启用增量更新"
        />
        <label for="admin-incremental-checkbox">增量更新</label>
      </div>

      <div aria-label="更新和删除操作按钮组">
        <button id="admin-start-update-btn" type="button" hidden aria-label="开始更新">
          开始更新
        </button>
        <button id="admin-delete-data-btn" type="button" hidden aria-label="删除此数据">
          删除此数据
        </button>
      </div>
    </section>

    <!-- 区域3：日志显示区 -->
    <section class="panel" aria-labelledby="adminLogsTitle">
      <h2 id="adminLogsTitle">运行日志</h2>
      <div
        id="admin-log-container"
        role="log"
        aria-live="polite"
        aria-relevant="additions text"
        aria-label="运行日志内容"
      ></div>
    </section>

    <!-- 区域3与区域4之间：清空日志按钮 -->
    <div>
      <button id="admin-clear-logs-btn" type="button" hidden aria-label="清空日志">
        清空日志
      </button>
    </div>

    <!-- 区域4：底部更新数据按钮 -->
    <footer class="panel" aria-label="底部操作区">
      <div id="admin-bottom-action-bar" aria-label="更新数据按钮容器">
        <button id="admin-open-add-dialog-btn" type="button" aria-label="更新数据">
          更新数据
        </button>
      </div>
    </footer>
  </main>

  <!-- 同页弹层：新增抓取对象 -->
  <section
    id="admin-add-target-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="adminAddDialogTitle"
    hidden
  >
    <h2 id="adminAddDialogTitle">新增抓取对象</h2>
    <div>
      <label for="admin-target-input">群组名称或链接</label>
      <input
        id="admin-target-input"
        name="admin-target-input"
        type="text"
        placeholder="请输入群组名称或链接"
        aria-label="群组名称或链接"
      />
    </div>
    <div aria-label="弹层操作按钮组">
      <button id="admin-dialog-cancel-btn" type="button" aria-label="取消新增抓取对象">取消</button>
      <button id="admin-dialog-confirm-btn" type="button" aria-label="确定新增抓取对象">确定</button>
    </div>
  </section>

  <script src="{{ url_for('static', filename='admin_manage.js') }}"></script>
</body>
</html>
