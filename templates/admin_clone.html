<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>克隆工作台</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_manage.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_clone.css') }}">
</head>
<body>
  <main class="page" id="admin-clone-hub-page">
    <header class="page-header">
      <p class="eyebrow">克隆系统</p>
      <h1>克隆工作台</h1>
      <p class="subtle">3 个入口：创建克隆群、继续克隆消息、已克隆群管理。</p>
      <p class="subtle">
        <a href="/admin/manage" class="admin-link">返回后台管理</a>
      </p>
    </header>

    <section class="panel clone-panel" aria-labelledby="cloneHubTitle">
      <div class="clone-panel-head">
        <div>
          <h2 id="cloneHubTitle" class="section-title">选择操作</h2>
        </div>
      </div>

      <div class="clone-hub-grid" aria-label="克隆工作台入口">
        <a class="clone-hub-card" href="/admin/clone/create">
          <span class="clone-hub-step">第 1 块</span>
          <strong>检查并创建克隆群组</strong>
          <span>检查源群和账号状态，创建克隆群。</span>
        </a>
        <a class="clone-hub-card" href="/admin/clone/migrate">
          <span class="clone-hub-step">第 2 块</span>
          <strong>继续克隆消息</strong>
          <span>对已创建的克隆群继续克隆消息。</span>
        </a>
        <a class="clone-hub-card" href="/admin/clone/runs/manage">
          <span class="clone-hub-step">第 3 块</span>
          <strong>已克隆群管理</strong>
          <span>查看和管理已经创建好的克隆群。</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
