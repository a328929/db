<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>克隆记录目录</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_manage.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_clone.css') }}">
</head>
<body>
  <main class="page" id="admin-clone-runs-page">
    <header class="page-header">
      <p class="eyebrow">克隆工作台 / 记录目录</p>
      <h1>克隆记录目录</h1>
      <p class="subtle">在这里定位记录；打开记录后可完成预检、迁移、恢复和删除。源群只用于识别，不会被修改。</p>
      <nav class="clone-workflow-nav" aria-label="克隆工作台导航">
        <ol class="clone-workflow-nav-list clone-workflow-nav-list-two-column">
          <li class="clone-workflow-nav-item">
            <a href="/admin/clone/create">
              <span class="clone-workflow-nav-index">+</span>
              <span>创建副本</span>
            </a>
          </li>
          <li class="clone-workflow-nav-item is-current">
            <a href="/admin/clone/runs/manage" aria-current="page">
              <span class="clone-workflow-nav-index">≡</span>
              <span>记录目录</span>
            </a>
          </li>
        </ol>
      </nav>
    </header>

    <section class="panel clone-panel" aria-labelledby="cloneRunFiltersTitle">
      <div class="clone-panel-head">
        <div>
          <h2 id="cloneRunFiltersTitle" class="section-title">筛选记录</h2>
          <p id="admin-clone-runs-manage-status" class="clone-subline" role="status" aria-live="polite">
            正在读取克隆记录...
          </p>
        </div>
        <div class="clone-toolbar">
          <button id="admin-clone-runs-manage-refresh-btn" class="btn" type="button" aria-label="刷新克隆记录">
            刷新
          </button>
        </div>
      </div>

      <div class="clone-runs-filter-grid">
        <div class="field">
          <label for="admin-clone-runs-query-input">搜索</label>
          <input
            id="admin-clone-runs-query-input"
            name="admin-clone-runs-query-input"
            type="text"
            autocomplete="off"
            placeholder="源群、目标名称"
            aria-label="搜索克隆记录"
          />
        </div>
        <div class="field">
          <label for="admin-clone-runs-status-filter">副本创建状态</label>
          <select id="admin-clone-runs-status-filter" aria-label="按克隆状态筛选">
            <option value="">全部状态</option>
            <option value="done">已创建</option>
            <option value="running">执行中</option>
            <option value="queued">排队中</option>
            <option value="deleting">删除中</option>
            <option value="error">失败</option>
          </select>
        </div>
        <div class="field">
          <label for="admin-clone-runs-sort-select">排序</label>
          <select id="admin-clone-runs-sort-select" aria-label="克隆记录排序方式">
            <option value="updated_desc">最近更新</option>
            <option value="source_asc">源群名称</option>
            <option value="target_asc">目标名称</option>
            <option value="status_asc">状态</option>
          </select>
        </div>
      </div>
    </section>

    <section class="panel clone-panel" aria-labelledby="cloneRunsListTitle">
      <div class="clone-panel-head">
        <div>
          <h2 id="cloneRunsListTitle" class="section-title">克隆记录</h2>
          <p id="admin-clone-runs-page-status" class="clone-subline" aria-live="polite">暂无分页信息。</p>
        </div>
        <div class="clone-toolbar">
          <button id="admin-clone-runs-prev-btn" class="btn" type="button" aria-label="上一页">
            上一页
          </button>
          <button id="admin-clone-runs-next-btn" class="btn" type="button" aria-label="下一页">
            下一页
          </button>
        </div>
      </div>
      <div id="admin-clone-runs-manage-list" class="clone-run-list clone-run-manage-list" aria-label="已克隆群列表"></div>
    </section>
  </main>

  <section
    id="admin-login-dialog"
    class="admin-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="adminLoginDialogTitle"
    hidden
  >
    <h2 id="adminLoginDialogTitle">管理员身份验证</h2>
    <p class="subtle">进入克隆记录目录，请先验证管理员密码。</p>
    <p id="admin-login-status" class="admin-login-status" role="status" aria-live="polite"></p>
    <div class="field">
      <label for="admin-password-input">登录密码</label>
      <input
        id="admin-password-input"
        name="admin-password-input"
        type="password"
        autocomplete="current-password"
        placeholder="请输入管理员密码"
        aria-label="管理员密码"
      />
    </div>
    <div aria-label="登录弹层操作按钮组">
      <button id="admin-login-confirm-btn" class="btn primary" type="button" aria-label="确定登录">确定登录</button>
    </div>
  </section>

  <script src="{{ url_for('static', filename='admin_manage_shared.js') }}"></script>
  <script src="{{ url_for('static', filename='admin_clone_runs.js') }}"></script>
</body>
</html>
