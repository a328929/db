<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>创建目标副本</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_manage.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_clone.css') }}">
</head>
<body>
  <main class="page" id="admin-clone-page" data-clone-mode="create">
    <header class="page-header">
      <p class="eyebrow">克隆工作台 / 新建记录</p>
      <h1>创建目标副本</h1>
      <p class="subtle">这里只创建新的目标副本。创建任务提交后会自动打开该记录，在同一处继续预检和迁移消息。</p>
      <nav class="clone-workflow-nav" aria-label="克隆工作台导航">
        <ol class="clone-workflow-nav-list clone-workflow-nav-list-two-column">
          <li class="clone-workflow-nav-item is-current">
            <a href="/admin/clone/create" aria-current="page">
              <span class="clone-workflow-nav-index">+</span>
              <span>创建副本</span>
            </a>
          </li>
          <li class="clone-workflow-nav-item">
            <a href="/admin/clone/runs/manage">
              <span class="clone-workflow-nav-index">≡</span>
              <span>记录目录</span>
            </a>
          </li>
        </ol>
      </nav>
    </header>

    <section id="admin-clone-source-stage" class="panel clone-panel clone-stage-section" data-stage-state="current" aria-labelledby="cloneSourceTitle">
      <div class="clone-panel-head">
        <div>
          <p class="clone-stage-kicker">准备</p>
          <h2 id="cloneSourceTitle" class="section-title">选择源群并完成检查</h2>
          <p id="admin-clone-source-status" class="clone-subline" role="status" aria-live="polite">
            正在读取数据库群组...
          </p>
        </div>
        <div class="clone-toolbar">
          <label for="admin-clone-sort-select" class="sr-only">排序方式</label>
          <select id="admin-clone-sort-select" aria-label="选择源群组排序方式">
            <option value="title_asc" selected>名称 A-Z</option>
            <option value="message_count_desc">消息数从大到小</option>
            <option value="updated_desc">最后消息从新到旧</option>
          </select>
          <button id="admin-clone-refresh-btn" class="btn" type="button" aria-label="刷新源群组列表">
            刷新
          </button>
        </div>
      </div>

      <div class="clone-select-row">
        <div class="field">
          <label for="admin-clone-source-select">源群组</label>
          <select id="admin-clone-source-select" aria-label="选择要克隆的数据库群组"></select>
        </div>
        <button id="admin-clone-preflight-btn" class="btn primary" type="button" aria-label="开始源群检查">
          开始检查
        </button>
      </div>

      <dl id="admin-clone-source-summary" class="clone-summary-grid" aria-label="源群组摘要"></dl>

      <section class="clone-stage-result" aria-labelledby="clonePreflightTitle">
        <div class="clone-stage-result-head">
          <div>
            <h3 id="clonePreflightTitle">检查结果</h3>
            <p id="admin-clone-preflight-status" class="clone-subline" role="status" aria-live="polite">
              选择源群后开始检查。
            </p>
          </div>
        </div>

        <ul id="admin-clone-metrics" class="admin-stats clone-stats" aria-label="克隆检查指标"></ul>
        <div class="clone-report-grid">
          <section class="clone-report-block" aria-labelledby="cloneCapabilitiesTitle">
            <h3 id="cloneCapabilitiesTitle">可执行项</h3>
            <div id="admin-clone-capabilities" class="clone-pill-list"></div>
          </section>
          <section class="clone-report-block" aria-labelledby="cloneWarningsTitle">
            <h3 id="cloneWarningsTitle">需要留意</h3>
            <ul id="admin-clone-warnings" class="clone-warning-list"></ul>
          </section>
        </div>
        <p id="admin-clone-recommendation" class="clone-recommendation" aria-live="polite"></p>
      </section>
    </section>

    <section id="admin-clone-create-stage" class="panel clone-panel clone-stage-section" data-stage-state="pending" aria-labelledby="cloneTargetTitle">
      <div class="clone-panel-head">
        <div>
          <p class="clone-stage-kicker">确认</p>
          <h2 id="cloneTargetTitle" class="section-title">确认并创建副本</h2>
          <p class="clone-subline">检查完成后可编辑副本信息。</p>
        </div>
      </div>

      <div class="clone-form-grid">
        <div class="field">
          <label for="admin-clone-target-title-input">副本标题</label>
          <input
            id="admin-clone-target-title-input"
            name="admin-clone-target-title-input"
            type="text"
            maxlength="128"
            placeholder="检查后自动填入"
            aria-label="目标副本标题"
          />
        </div>
        <div class="field">
          <label for="admin-clone-target-kind-select">副本类型</label>
          <select id="admin-clone-target-kind-select" aria-label="选择目标副本类型">
            <option value="megagroup">超级群</option>
            <option value="channel">频道</option>
          </select>
        </div>
      </div>

      <div class="clone-confirm-grid">
        <div class="field">
          <label for="admin-clone-confirm-input">操作确认码</label>
          <input
            id="admin-clone-confirm-input"
            name="admin-clone-confirm-input"
            type="text"
            autocomplete="off"
            aria-label="输入创建副本确认码"
          />
        </div>
        <p id="admin-clone-confirm-hint" class="clone-confirm-hint" aria-live="polite"></p>
      </div>

      <div class="clone-actions">
        <button id="admin-clone-start-btn" class="btn primary" type="button" disabled aria-label="创建副本">
          创建副本
        </button>
      </div>
    </section>

  </main>

  <section
    id="admin-login-dialog"
    class="admin-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="adminLoginDialogTitle"
    hidden
  >
    <h2 id="adminLoginDialogTitle">管理员身份验证</h2>
    <p class="subtle">进入创建副本页面，请先验证管理员密码。</p>
    <p id="admin-login-status" class="admin-login-status" role="status" aria-live="polite"></p>
    <div class="field">
      <label for="admin-password-input">登录密码</label>
      <input
        id="admin-password-input"
        name="admin-password-input"
        type="password"
        placeholder="请输入管理员密码"
        aria-label="管理员密码"
      />
    </div>
    <div aria-label="登录弹层操作按钮组">
      <button id="admin-login-confirm-btn" class="btn primary" type="button" aria-label="确定登录">确定登录</button>
    </div>
  </section>

  <script src="{{ url_for('static', filename='admin_manage_shared.js') }}"></script>
  <script src="{{ url_for('static', filename='admin_clone_create.js') }}"></script>
</body>
</html>
