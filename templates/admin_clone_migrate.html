<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>迁移消息</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_manage.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_clone.css') }}">
</head>
<body>
  <main class="page" id="admin-clone-page" data-clone-mode="migrate">
    <header class="page-header">
      <p class="eyebrow">第 2 步 / 共 3 步</p>
      <h1>迁移消息</h1>
      <nav class="clone-workflow-nav" aria-label="克隆流程">
        <ol class="clone-workflow-nav-list">
          <li class="clone-workflow-nav-item">
            <a href="/admin/clone/create">
              <span class="clone-workflow-nav-index">1</span>
              <span>创建副本</span>
            </a>
          </li>
          <li class="clone-workflow-nav-item is-current">
            <a href="/admin/clone/migrate" aria-current="step">
              <span class="clone-workflow-nav-index">2</span>
              <span>迁移消息</span>
            </a>
          </li>
          <li class="clone-workflow-nav-item">
            <a href="/admin/clone/runs/manage">
              <span class="clone-workflow-nav-index">3</span>
              <span>管理记录</span>
            </a>
          </li>
        </ol>
      </nav>
    </header>

    <section id="admin-clone-select-stage" class="panel clone-panel clone-stage-section" data-stage-state="current" aria-labelledby="cloneRunsTitle">
      <div class="clone-panel-head">
        <div>
          <p class="clone-stage-kicker">本页 1 / 3</p>
          <h2 id="cloneRunsTitle" class="section-title">选择要迁移的副本</h2>
          <p id="admin-clone-runs-status" class="clone-subline" role="status" aria-live="polite">
            正在读取克隆记录...
          </p>
          <p id="admin-clone-source-status" class="clone-subline" role="status" aria-live="polite">
            正在读取源群组筛选项...
          </p>
        </div>
        <div class="clone-toolbar">
          <label for="admin-clone-sort-select" class="sr-only">源群排序方式</label>
          <select id="admin-clone-sort-select" aria-label="选择源群组排序方式">
            <option value="title_asc" selected>名称 A-Z</option>
            <option value="updated_desc">最后消息从新到旧</option>
          </select>
          <button id="admin-clone-refresh-btn" class="btn" type="button" aria-label="刷新源群组列表">
            刷新源群
          </button>
        </div>
      </div>

      <div class="clone-select-row clone-filter-row">
        <div class="field">
          <label for="admin-clone-source-select">按源群筛选</label>
          <select id="admin-clone-source-select" aria-label="按源群组筛选已创建副本"></select>
        </div>
        <button id="admin-clone-runs-refresh-btn" class="btn" type="button" aria-label="刷新克隆群记录">
          刷新记录
        </button>
      </div>

      <div id="admin-clone-runs-list" class="clone-run-list clone-select-run-list" aria-label="可迁移的克隆运行记录列表"></div>
    </section>

    <section id="admin-clone-plan-stage" class="panel clone-panel clone-stage-section" data-stage-state="pending" aria-labelledby="clonePlanTitle">
      <div class="clone-panel-head">
        <div>
          <p class="clone-stage-kicker">本页 2 / 3</p>
          <h2 id="clonePlanTitle" class="section-title">确认迁移方案</h2>
          <p id="admin-clone-plan-status" class="clone-subline" role="status" aria-live="polite">
            选择副本后生成迁移方案。
          </p>
        </div>
        <div class="clone-toolbar">
          <button id="admin-clone-plan-refresh-btn" class="btn" type="button" aria-label="刷新克隆计划">
            刷新方案
          </button>
          <button id="admin-clone-deep-preflight-btn" class="btn primary" type="button" aria-label="生成克隆计划">
            生成迁移方案
          </button>
        </div>
      </div>

      <p id="admin-clone-plan-run-label" class="clone-selected-run" aria-live="polite">
        当前未选择副本。
      </p>
      <dl id="admin-clone-plan-summary" class="clone-summary-grid clone-plan-summary" aria-label="迁移方案摘要"></dl>
      <div class="clone-report-grid clone-plan-grid">
        <section class="clone-report-block" aria-labelledby="clonePlanBlockingTitle">
          <h3 id="clonePlanBlockingTitle">阻断项</h3>
          <ul id="admin-clone-plan-blocking" class="clone-warning-list clone-blocking-list"></ul>
        </section>
        <section class="clone-report-block" aria-labelledby="clonePlanWarningsTitle">
          <h3 id="clonePlanWarningsTitle">注意事项</h3>
          <ul id="admin-clone-plan-warnings" class="clone-warning-list"></ul>
        </section>
      </div>
    </section>

    <section id="admin-clone-migration-stage" class="panel clone-panel clone-stage-section" data-stage-state="pending" aria-labelledby="cloneTimelineTitle">
      <div class="clone-panel-head">
        <div>
          <p class="clone-stage-kicker">本页 3 / 3</p>
          <h2 id="cloneTimelineTitle" class="section-title">开始迁移消息</h2>
          <p id="admin-clone-timeline-status" class="clone-subline" role="status" aria-live="polite">
            等待迁移方案完成。
          </p>
        </div>
        <div class="clone-toolbar">
          <button id="admin-clone-timeline-migration-btn" class="btn primary" type="button" aria-label="开始继续克隆">
            开始克隆消息
          </button>
        </div>
      </div>

      <details class="clone-options-details">
        <summary>本次执行设置</summary>
        <div class="clone-form-grid clone-migration-options">
          <div class="field">
            <label for="admin-clone-message-limit-input">本次处理上限</label>
            <input
              id="admin-clone-message-limit-input"
              name="admin-clone-message-limit-input"
              type="number"
              min="0"
              max="100000"
              inputmode="numeric"
              placeholder="留空表示全部"
              aria-label="本次最多处理的时间线消息数"
            />
          </div>
          <div class="field">
            <label for="admin-clone-send-delay-input">发送间隔（毫秒）</label>
            <input
              id="admin-clone-send-delay-input"
              name="admin-clone-send-delay-input"
              type="number"
              min="0"
              max="60000"
              inputmode="numeric"
              value="500"
              aria-label="每次时间线发送后的等待毫秒数"
            />
          </div>
        </div>
      </details>
      <dl id="admin-clone-timeline-summary" class="clone-summary-grid clone-migration-summary" aria-label="群总进度与最近任务报告"></dl>
    </section>

    <details id="admin-clone-log-panel" class="panel clone-panel clone-log-panel">
      <summary class="clone-log-summary">执行日志</summary>
      <div class="admin-log-head clone-log-head">
        <h2 class="sr-only">本页日志</h2>
        <button id="admin-clear-clone-logs-btn" class="btn" type="button" hidden aria-label="清空克隆日志">
          清空日志
        </button>
      </div>
      <div id="admin-clone-log-container" class="admin-log-container" aria-label="执行日志"></div>
    </details>
  </main>

  <section
    id="admin-login-dialog"
    class="admin-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="adminLoginDialogTitle"
    hidden
  >
    <h2 id="adminLoginDialogTitle">管理员身份验证</h2>
    <p class="subtle">进入迁移消息页面，请先验证管理员密码。</p>
    <p id="admin-login-status" class="admin-login-status" role="status" aria-live="polite"></p>
    <div class="field">
      <label for="admin-password-input">登录密码</label>
      <input
        id="admin-password-input"
        name="admin-password-input"
        type="password"
        placeholder="请输入管理员密码"
        aria-label="管理员密码"
      />
    </div>
    <div aria-label="登录弹层操作按钮组">
      <button id="admin-login-confirm-btn" class="btn primary" type="button" aria-label="确定登录">确定登录</button>
    </div>
  </section>

  <script src="{{ url_for('static', filename='admin_manage_shared.js') }}"></script>
  <script src="{{ url_for('static', filename='admin_clone.js') }}"></script>
</body>
</html>
