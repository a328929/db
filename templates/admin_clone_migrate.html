<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>继续克隆消息</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_manage.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_clone.css') }}">
</head>
<body>
  <main class="page" id="admin-clone-page" data-clone-mode="migrate">
    <header class="page-header">
      <p class="eyebrow">第 2 块</p>
      <h1>继续克隆消息</h1>
      <p class="subtle">选择已创建的克隆群，继续克隆消息。</p>
      <nav class="clone-page-nav" aria-label="继续克隆消息页面导航">
        <span class="clone-page-nav-badge">当前位置：继续克隆消息</span>
        <div class="clone-page-nav-links">
          <a href="/admin/clone">克隆工作台</a>
          <a href="/admin/clone/create">检查并创建克隆群组</a>
          <a href="/admin/clone/runs/manage">已克隆群管理</a>
        </div>
      </nav>
    </header>

    <section class="panel clone-panel" aria-labelledby="cloneSourceTitle">
      <div class="clone-panel-head">
        <div>
          <h2 id="cloneSourceTitle" class="section-title">选择源群</h2>
          <p id="admin-clone-source-status" class="clone-subline" role="status" aria-live="polite">
            正在读取数据库群组...
          </p>
        </div>
        <div class="clone-toolbar">
          <label for="admin-clone-sort-select" class="sr-only">排序方式</label>
          <select id="admin-clone-sort-select" aria-label="选择源群组排序方式">
            <option value="updated_desc">最后消息从新到旧</option>
            <option value="title_asc">名称 A-Z</option>
          </select>
          <button id="admin-clone-refresh-btn" class="btn" type="button" aria-label="刷新源群组列表">
            刷新
          </button>
        </div>
      </div>

      <div class="clone-select-row">
        <div class="field">
          <label for="admin-clone-source-select">源群组筛选</label>
          <select id="admin-clone-source-select" aria-label="按源群组筛选已创建副本"></select>
        </div>
        <button id="admin-clone-runs-refresh-btn" class="btn primary" type="button" aria-label="刷新克隆群记录">
          刷新克隆群记录
        </button>
      </div>

      <dl id="admin-clone-source-summary" class="clone-summary-grid" aria-label="当前源群组摘要"></dl>
    </section>

    <section class="panel clone-panel" aria-labelledby="cloneRunsTitle">
      <div class="clone-panel-head">
        <div>
          <h2 id="cloneRunsTitle" class="section-title">选择克隆群</h2>
          <p id="admin-clone-runs-status" class="clone-subline" role="status" aria-live="polite">
            选择一个已创建好的克隆群继续操作。
          </p>
        </div>
      </div>

      <div id="admin-clone-runs-list" class="clone-run-list" aria-label="克隆运行记录列表"></div>
    </section>

    <section class="panel clone-panel" aria-labelledby="clonePlanTitle">
      <div class="clone-panel-head">
        <div>
          <h2 id="clonePlanTitle" class="section-title">继续克隆</h2>
          <p id="admin-clone-plan-status" class="clone-subline" role="status" aria-live="polite">
            先生成计划，再开始继续克隆。
          </p>
        </div>
        <div class="clone-toolbar">
          <button id="admin-clone-plan-refresh-btn" class="btn" type="button" aria-label="刷新克隆计划">
            刷新
          </button>
          <button id="admin-clone-deep-preflight-btn" class="btn primary" type="button" aria-label="生成克隆计划">
            生成克隆计划
          </button>
          <button id="admin-clone-timeline-migration-btn" class="btn primary" type="button" aria-label="开始继续克隆">
            开始继续克隆
          </button>
        </div>
      </div>

      <p id="admin-clone-plan-run-label" class="clone-selected-run" aria-live="polite">
        当前未选择副本。
      </p>
      <dl id="admin-clone-plan-summary" class="clone-summary-grid clone-plan-summary" aria-label="克隆计划摘要"></dl>
      <div class="clone-report-grid clone-plan-grid">
        <section class="clone-report-block" aria-labelledby="clonePlanBlockingTitle">
          <h3 id="clonePlanBlockingTitle">阻断项</h3>
          <ul id="admin-clone-plan-blocking" class="clone-warning-list clone-blocking-list"></ul>
        </section>
        <section class="clone-report-block" aria-labelledby="clonePlanWarningsTitle">
          <h3 id="clonePlanWarningsTitle">警告</h3>
          <ul id="admin-clone-plan-warnings" class="clone-warning-list"></ul>
        </section>
      </div>
      <div class="clone-form-grid clone-migration-options">
        <div class="field">
          <label for="admin-clone-message-limit-input">本次处理上限</label>
          <input
            id="admin-clone-message-limit-input"
            name="admin-clone-message-limit-input"
            type="number"
            min="0"
            max="100000"
            inputmode="numeric"
            placeholder="留空表示全部"
            aria-label="本次最多处理的时间线消息数"
          />
        </div>
        <div class="field">
          <label for="admin-clone-send-delay-input">发送间隔（毫秒）</label>
          <input
            id="admin-clone-send-delay-input"
            name="admin-clone-send-delay-input"
            type="number"
            min="0"
            max="60000"
            inputmode="numeric"
            value="500"
            aria-label="每次时间线发送后的等待毫秒数"
          />
        </div>
      </div>
      <p id="admin-clone-timeline-status" class="clone-subline clone-migration-status" role="status" aria-live="polite">
        尚未开始继续克隆。
      </p>
      <dl id="admin-clone-timeline-summary" class="clone-summary-grid clone-migration-summary" aria-label="继续克隆摘要"></dl>
    </section>

    <section class="panel clone-panel" aria-labelledby="cloneLogTitle" aria-describedby="cloneLogHelp">
      <div class="admin-log-head clone-log-head">
        <h2 id="cloneLogTitle" class="section-title">本页日志</h2>
        <button id="admin-clear-clone-logs-btn" class="btn" type="button" hidden aria-label="清空克隆日志">
          清空日志
        </button>
      </div>
      <p id="cloneLogHelp" class="sr-only">
        日志区域可滚动。聚焦后可使用方向键浏览已生成的日志内容。
      </p>
      <div id="admin-clone-log-container" class="admin-log-container"></div>
    </section>
  </main>

  <section
    id="admin-login-dialog"
    class="admin-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="adminLoginDialogTitle"
    hidden
  >
    <h2 id="adminLoginDialogTitle">管理员身份验证</h2>
    <p class="subtle">进入继续克隆消息页面，请先验证管理员密码。</p>
    <p id="admin-login-status" class="admin-login-status" role="status" aria-live="polite"></p>
    <div class="field">
      <label for="admin-password-input">登录密码</label>
      <input
        id="admin-password-input"
        name="admin-password-input"
        type="password"
        placeholder="请输入管理员密码"
        aria-label="管理员密码"
      />
    </div>
    <div aria-label="登录弹层操作按钮组">
      <button id="admin-login-confirm-btn" class="btn primary" type="button" aria-label="确定登录">确定登录</button>
    </div>
  </section>

  <script src="{{ url_for('static', filename='admin_manage_shared.js') }}"></script>
  <script src="{{ url_for('static', filename='admin_clone.js') }}"></script>
</body>
</html>
